name: Build obfuskiertes index.php

on:
  push:
    paths:
      - 'index2.php'
      - 'build.php'
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: PHP einrichten
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Build
        run: php build.php

      - name: index.php committen
        run: |
          git config user.name "build-bot"
          git config user.email "bot@noreply.github.com"
          git add index.php
          git diff --staged --quiet || git commit -m "build: update index.php [skip ci]"
          git push
